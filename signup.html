<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Silent Leveling</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="auth-logo">Silent Leveling</a>
        <div class="auth-card glass">
            <h2>Start Your Journey</h2>
            <p>Commit to the system.</p>
            <form id="signupForm">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div id="error-msg" class="error-msg"></div>
                <button type="submit" class="btn-primary auth-btn">Create Account</button>
            </form>
            <p class="auth-switch">Already have an account? <a href="signin.html">Log in</a></p>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
