<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Silent Leveling</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="auth-logo">Silent Leveling</a>
        <div class="auth-card glass">
            <h2>Welcome Back</h2>
            <p>Resume your execution.</p>
            <form id="signinForm">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div id="error-msg" class="error-msg"></div>
                <button type="submit" class="btn-primary auth-btn">Log In</button>
            </form>
            <p class="auth-switch">No account yet? <a href="signup.html">Sign up</a></p>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
